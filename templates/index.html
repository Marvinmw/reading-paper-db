function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════
//  Multi-Terminal
// ═══════════════════════════════════════════════════════
let socket;
let terms = {};        // term_id -> { term, fitAddon, autoScroll }
let activeTermId = null;
let _termCounter = 0;

function initTerminal() {
  socket = io({transports:['websocket']});

  socket.on('connect', () => {
    const ids = Object.keys(terms);
    if (ids.length === 0) {
      newTerminal();
    } else {
      ids.forEach(tid => {
        const s = terms[tid];
        s.term.reset();
        s.autoScroll = true;
        socket.emit('term_start', {term_id: tid, cols: s.term.cols, rows: s.term.rows});
      });
    }
  });

  socket.on('disconnect', () => {
    Object.values(terms).forEach(s =>
      s.term.writeln('\r\n\x1b[33m[连接断开，正在重连…]\x1b[0m'));
  });

  socket.on('term_output', d => {
    const s = terms[d.term_id];
    if (!s) return;
    s.term.write(d.data);
    if (s.autoScroll) s.term.scrollToBottom();
  });
}

function newTerminal() {
  _termCounter++;
  const tid = String(_termCounter);

  const body = document.createElement('div');
  body.className = 'term-body';
  body.id = `term-body-${tid}`;
  document.getElementById('termBodies').appendChild(body);

  const term = new Terminal({
    theme:{background:'#0d1117',foreground:'#c9d1d9',cursor:'#58a6ff',selectionBackground:'#264f78'},
    fontFamily:'Menlo,Monaco,"Courier New",monospace',
    fontSize:13, lineHeight:1.4, cursorBlink:true, scrollback:5000,
    allowProposedApi:true, scrollOnUserInput:true,
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(body);

  const state = {term, fitAddon, autoScroll: true};
  terms[tid] = state;

  term.onScroll(() => {
    const atBottom = term.buffer.active.viewportY >= term.buffer.active.length - term.rows;
    state.autoScroll = atBottom;
  });
  term.onData(d => {
    state.autoScroll = true;
    socket.emit('term_input', {term_id: tid, data: d});
  });

  new ResizeObserver(() => {
    if (body.classList.contains('active')) {
      fitAddon.fit();
      socket.emit('term_resize', {term_id: tid, cols: term.cols, rows: term.rows});
    }
  }).observe(body);

  _addTab(tid);
  switchTerminal(tid);

  if (socket && socket.connected) {
    fitAddon.fit();
    socket.emit('term_start', {term_id: tid, cols: term.cols, rows: term.rows});
  }
}

function _addTab(tid) {
  const tab = document.createElement('div');
  tab.className = 'term-tab';
  tab.id = `term-tab-${tid}`;
  tab.innerHTML =
    `<span onclick="switchTerminal('${tid}')">Terminal ${tid}</span>` +
    `<button class="term-tab-close" onclick="closeTerminal('${tid}')" title="关闭">×</button>`;
  const addBtn = document.querySelector('.term-add-btn');
  document.getElementById('termTabs').insertBefore(tab, addBtn);
}

function switchTerminal(tid) {
  if (activeTermId) {
    document.getElementById(`term-body-${activeTermId}`)?.classList.remove('active');
    document.getElementById(`term-tab-${activeTermId}`)?.classList.remove('active');
  }
  activeTermId = tid;
  const body = document.getElementById(`term-body-${tid}`);
  document.getElementById(`term-tab-${tid}`)?.classList.add('active');
  if (body) {
    body.classList.add('active');
    requestAnimationFrame(() => {
      const s = terms[tid];
      if (s) {
        s.fitAddon.fit();
        socket.emit('term_resize', {term_id: tid, cols: s.term.cols, rows: s.term.rows});
      }
    });
  }
}

function closeTerminal(tid) {
  if (Object.keys(terms).length <= 1) return;
  socket.emit('term_close', {term_id: tid});
  terms[tid]?.term.dispose();
  delete terms[tid];
  document.getElementById(`term-body-${tid}`)?.remove();
  document.getElementById(`term-tab-${tid}`)?.remove();
  if (activeTermId === tid) {
    const remaining = Object.keys(terms);
    activeTermId = null;
    if (remaining.length) switchTerminal(remaining[remaining.length - 1]);
  }
}

function sendCmd(cmd) {
  if (!activeTermId) return;
  terms[activeTermId].autoScroll = true;
  socket.emit('term_input', {term_id: activeTermId, data: cmd});
}

function termClear() {
  if (!activeTermId) return;
  const s = terms[activeTermId];
  s.term.reset();
  s.autoScroll = true;
  socket.emit('term_input', {term_id: activeTermId, data: '\x0c'});
}

// ═══════════════════════════════════════════════════════
//  Resizer
// ═══════════════════════════════════════════════════════
function initResizer() {
  const handle   = document.getElementById('resizeHandle');
  const termPanel = document.getElementById('termPanel');
  const MIN_W = 180, MAX_RATIO = 0.85;

  // Restore saved width (clamped so it can't consume the full viewport)
  const saved = localStorage.getItem('termPanelWidth');
  if (saved) {
    const w = Math.max(MIN_W, Math.min(window.innerWidth * MAX_RATIO, parseInt(saved, 10)));
    termPanel.style.width = w + 'px';
  }

  handle.addEventListener('mousedown', e => {
    const startX     = e.clientX;
    const startWidth = termPanel.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor      = 'col-resize';
    document.body.style.userSelect  = 'none';

    function onMove(e) {
      const dx = startX - e.clientX;   // drag left → wider terminal
      const newW = Math.max(MIN_W, Math.min(window.innerWidth * MAX_RATIO, startWidth + dx));
      termPanel.style.width = newW + 'px';
      refitActiveTerminal();
    }

    function onUp() {
      handle.classList.remove('dragging');
      document.body.style.cursor     = '';
      document.body.style.userSelect = '';
      localStorage.setItem('termPanelWidth', termPanel.offsetWidth);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    e.preventDefault();
  });
}

function refitActiveTerminal() {
  if (!activeTermId || !terms[activeTermId]) return;
  const s = terms[activeTermId];
  requestAnimationFrame(() => {
    s.fitAddon.fit();
    if (socket && socket.connected)
      socket.emit('term_resize', {term_id: activeTermId, cols: s.term.cols, rows: s.term.rows});
  });
}

// ═══════════════════════════════════════════════════════
//  File Manager (Browser)
// ═══════════════════════════════════════════════════════
let _fbPath     = '';          // current directory path (relative to current root)
let _fbItems    = [];          // raw items from server
let _fbSortKey  = 'name';
let _fbSortAsc  = true;
let _fbInited   = false;
let _fbRootIdx  = 0;           // currently selected root index
let _fbRoots    = [];          // [{id, path, name, is_project}]

async function initBrowserTab() {
  if (!_fbInited) {
    _fbInited = true;
    await _fbLoadRoots();
    fbNavigate('');
  }
}

async function _fbLoadRoots() {
  _fbRoots = await fetch('/api/roots').then(r => r.json()).catch(() => []);
  if (!_fbRoots.length) _fbRoots = [{id:0, path:'', name:'项目目录', is_project:true}];
  const sel = document.getElementById('fbRootSelect');
  sel.innerHTML = _fbRoots.map(r =>
    `<option value="${r.id}">${r.is_project ? '📁 ' : '🔗 '}${r.name}</option>`
  ).join('');
  sel.value = _fbRootIdx;
  document.getElementById('fbRemoveBtn').style.display = _fbRootIdx > 0 ? '' : 'none';
}

function fbSelectRoot(idx) {
  _fbRootIdx = parseInt(idx);
  _fbPath = '';
  document.getElementById('fbRemoveBtn').style.display = _fbRootIdx > 0 ? '' : 'none';
  fbNavigate('');
}

async function fbAddRoot() {
  const raw = prompt('输入目录的绝对路径（支持 ~ 展开）：\n\n已通过 /add-dir 添加的目录会自动出现，无需手动填写。');
  if (!raw || !raw.trim()) return;
  const res = await fetch('/api/roots/add', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({path: raw.trim()}),
  }).then(r => r.json()).catch(() => null);
  if (!res || res.error) { alert(res?.error || '添加失败'); return; }
  await _fbLoadRoots();
  _fbRootIdx = res.id;
  document.getElementById('fbRootSelect').value = _fbRootIdx;
  document.getElementById('fbRemoveBtn').style.display = '';
  fbNavigate('');
}

async function fbRemoveRoot() {
  if (_fbRootIdx === 0) return;
  const root = _fbRoots[_fbRootIdx];
  if (!confirm(`从列表中移除「${root?.name || '该目录'}」？\n（仅移除浏览入口，不删除文件）`)) return;
  const res = await fetch('/api/roots/remove', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({id: _fbRootIdx}),
  }).then(r => r.json()).catch(() => null);
  if (!res || res.error) { alert(res?.error || '移除失败'); return; }
  _fbRootIdx = 0;
  await _fbLoadRoots();
  fbNavigate('');
}

async function fbNavigate(path) {
  _fbPath = path;
  const data = await fetch(`/api/fs/list?path=${encodeURIComponent(path)}&root=${_fbRootIdx}`)
    .then(r => r.json()).catch(() => []);
  _fbItems = Array.isArray(data) ? data : [];
  _fbRenderCrumbs();
  _fbRenderItems();
  document.getElementById('fbUpBtn').disabled = !path;
}

function fbUp() {
  const parts = _fbPath.split('/').filter(Boolean);
  parts.pop();
  fbNavigate(parts.join('/'));
}

function fbRefresh() { fbNavigate(_fbPath); }

function fbSort(key) {
  if (_fbSortKey === key) {
    _fbSortAsc = !_fbSortAsc;
  } else {
    _fbSortKey = key;
    _fbSortAsc = key === 'name' || key === 'type';
  }
  _fbRenderItems();
}

function _fbRenderCrumbs() {
  const parts   = _fbPath ? _fbPath.split('/').filter(Boolean) : [];
  const crumbs  = document.getElementById('fbCrumbs');
  crumbs.innerHTML = '';

  const mkCrumb = (label, path, last) => {
    const sp = document.createElement('span');
    sp.className = 'fb-crumb' + (last ? ' fb-last' : '');
    sp.textContent = label;
    if (!last) sp.onclick = () => fbNavigate(path);
    return sp;
  };
  const mkSep = () => { const s = document.createElement('span'); s.className='fb-sep'; s.textContent='›'; return s; };

  crumbs.appendChild(mkCrumb('🏠 根目录', '', parts.length === 0));
  parts.forEach((part, i) => {
    crumbs.appendChild(mkSep());
    crumbs.appendChild(mkCrumb(part, parts.slice(0, i + 1).join('/'), i === parts.length - 1));
  });
}

function _fbRenderItems() {
  // Sort
  const sorted = [..._fbItems].sort((a, b) => {
    // Directories always first
    if (a.is_dir !== b.is_dir) return a.is_dir ? -1 : 1;
    let va, vb;
    if (_fbSortKey === 'name') { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
    else if (_fbSortKey === 'type') { va = a.ext; vb = b.ext; }
    else if (_fbSortKey === 'size') { va = a.size; vb = b.size; }
    else if (_fbSortKey === 'mtime') { va = a.mtime; vb = b.mtime; }
    if (va < vb) return _fbSortAsc ? -1 : 1;
    if (va > vb) return _fbSortAsc ? 1 : -1;
    return 0;
  });

  // Update sort arrow indicators
  ['name','type','size','mtime'].forEach(k => {
    const el = document.getElementById('fbSort' + k.charAt(0).toUpperCase() + k.slice(1));
    if (!el) return;
    el.textContent = _fbSortKey === k ? (_fbSortAsc ? '▲' : '▼') : '';
    el.closest('th').classList.toggle('sorted', _fbSortKey === k);
  });

  const tbody = document.getElementById('fbItems');
  if (!sorted.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="fb-empty">（空目录）</td></tr>`;
    return;
  }

  tbody.innerHTML = '';
  sorted.forEach(item => {
    const tr = document.createElement('tr');
    if (item.is_dir) tr.classList.add('fb-dir');

    const icon    = item.is_dir ? '📁' : fileIcon(item.ext);
    const typeStr = item.is_dir ? '文件夹' : (item.ext ? item.ext.slice(1).toUpperCase() : '文件');
    const sizeStr = item.is_dir ? '—' : _fbFmtSize(item.size);
    const dateStr = _fbFmtDate(item.mtime);

    tr.innerHTML = `
      <td><div class="fb-name-cell">
        <span class="fb-item-icon">${icon}</span>
        <span class="fb-item-name" title="${esc(item.path)}">${esc(item.name)}</span>
      </div></td>
      <td class="fb-col-type">${typeStr}</td>
      <td class="fb-col-size">${sizeStr}</td>
      <td class="fb-col-date">${dateStr}</td>`;

    if (item.is_dir) {
      tr.ondblclick = () => fbNavigate(item.path);
      tr.onclick    = () => {};  // single click: select only (no action)
    } else {
      tr.ondblclick = () => _fbOpenInEditor(item.path, item.ext);
      tr.onclick    = () => _fbSelectRow(tr);
    }

    tbody.appendChild(tr);
  });
}

let _fbSelectedRow = null;
function _fbSelectRow(tr) {
  if (_fbSelectedRow) _fbSelectedRow.style.background = '';
  _fbSelectedRow = tr;
  tr.style.background = '#dbeafe';
}

function _fbOpenInEditor(path, ext) {
  switchTab('editor');
  _openFile(path, ext, _fbRootIdx);
}

function _fbFmtSize(bytes) {
  if (!bytes) return '0 B';
  if (bytes < 1024)        return bytes + ' B';
  if (bytes < 1048576)     return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824)  return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1073741824).toFixed(2) + ' GB';
}

function _fbFmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  const ymd = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const hm  = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  return `${ymd} ${hm}`;
}

// ═══════════════════════════════════════════════════════
//  File Editor
// ═══════════════════════════════════════════════════════
let monacoEditor  = null;
let monacoReady   = false;
let currentFile   = null;   // { path, ext }
let editorDirty   = false;
let _pendingFile  = null;   // file to open once Monaco loads
let _treeCache    = {};     // dirPath -> items[]
let _treeExpanded = {};     // dirPath -> bool

const EXT_LANG = {
  '.py':'python', '.js':'javascript', '.ts':'typescript', '.jsx':'javascript',
  '.tsx':'typescript', '.json':'json', '.jsonl':'json', '.md':'markdown',
  '.yaml':'yaml', '.yml':'yaml', '.sh':'shell', '.bash':'shell',
  '.html':'html', '.css':'css', '.sql':'sql', '.xml':'xml',
  '.toml':'ini', '.ini':'ini', '.txt':'plaintext', '.env':'shell',
};
const EXT_ICON = {
  '.py':'🐍', '.js':'📜', '.ts':'📜', '.jsx':'📜', '.tsx':'📜',
  '.json':'{}', '.jsonl':'{}', '.md':'📝', '.txt':'📄',
  '.sh':'⚙', '.bash':'⚙', '.yaml':'⚙', '.yml':'⚙', '.toml':'⚙',
  '.html':'🌐', '.css':'🎨', '.sql':'🗄', '.xml':'📋',
};

function fileIcon(ext) { return EXT_ICON[ext] || '📄'; }

// ─── Init ────────────────────────────────────────────────
function initEditorTab() {
  if (monacoReady) { refreshFileTree(); return; }
  if (typeof require !== 'undefined') { _setupMonaco(); return; }
  document.getElementById('editorPlaceholder').innerHTML =
    '<span style="font-size:28px">⏳</span><span>正在加载编辑器…</span><span style="font-size:11px;color:#444">首次加载需联网，请稍候</span>';
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js';
  s.onload = _setupMonaco;
  s.onerror = () => {
    document.getElementById('editorPlaceholder').innerHTML =
      '<span style="font-size:28px">⚠️</span><span>Monaco 编辑器加载失败（需联网）</span><span style="font-size:11px;color:#444">请检查网络连接后刷新页面</span>';
  };
  document.head.appendChild(s);
}

function _setupMonaco() {
  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' } });
  require(['vs/editor/editor.main'], function() {
    const container = document.getElementById('monacoContainer');
    monacoEditor = monaco.editor.create(container, {
      value: '',
      language: 'plaintext',
      theme: 'vs-dark',
      automaticLayout: true,
      minimap: { enabled: true },
      fontSize: 13,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      lineNumbers: 'on',
      wordWrap: 'off',
      scrollBeyondLastLine: false,
      tabSize: 4,
      renderWhitespace: 'selection',
    });

    monacoEditor.onDidChangeModelContent(() => {
      if (!editorDirty) {
        editorDirty = true;
        document.getElementById('editorDirtyDot').classList.add('on');
        document.getElementById('editorSaveBtn').disabled = false;
      }
      _refreshMdPreview();
    });

    monacoEditor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, saveCurrentFile);

    monacoReady = true;
    const pending = _pendingFile;
    _pendingFile = null;
    refreshFileTree().then(() => {
      if (pending) _openFile(pending.path, pending.ext, pending.rootIdx || 0);
    });
  });
}

// ─── File tree ────────────────────────────────────────────
async function refreshFileTree() {
  _treeCache = {};
  await _loadDir('');
  _renderTree();
}

async function _loadDir(path) {
  const items = await fetch(`/api/fs/list?path=${encodeURIComponent(path)}`)
    .then(r => r.json()).catch(() => []);
  _treeCache[path] = Array.isArray(items) ? items : [];
}

function _renderTree() {
  const container = document.getElementById('editorTree');
  container.innerHTML = '';
  _renderLevel('', 0, container);
}

function _renderLevel(dirPath, depth, container) {
  const items = _treeCache[dirPath] || [];
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'tree-item' + (item.is_dir ? ' is-dir' : '') +
      (currentFile && item.path === currentFile.path ? ' active' : '');
    div.style.paddingLeft = (6 + depth * 14) + 'px';

    const icon = item.is_dir
      ? (_treeExpanded[item.path] ? '📂' : '📁')
      : fileIcon(item.ext);
    div.innerHTML = `<span class="ti-icon">${icon}</span><span class="ti-name" title="${esc(item.path)}">${esc(item.name)}</span>`;

    if (item.is_dir) {
      div.onclick = async () => {
        if (_treeExpanded[item.path]) {
          _treeExpanded[item.path] = false;
        } else {
          _treeExpanded[item.path] = true;
          if (!_treeCache[item.path]) await _loadDir(item.path);
        }
        _renderTree();
      };
    } else {
      div.onclick = () => _openFile(item.path, item.ext);
    }

    container.appendChild(div);
    if (item.is_dir && _treeExpanded[item.path]) {
      _renderLevel(item.path, depth + 1, container);
    }
  });
}

// ─── Open / Save ──────────────────────────────────────────
async function _openFile(path, ext, rootIdx = 0) {
  if (editorDirty && !confirm('有未保存的更改，确定要离开当前文件吗？')) return;

  const res = await fetch(`/api/fs/read?path=${encodeURIComponent(path)}&root=${rootIdx}`)
    .then(r => r.json()).catch(() => null);
  if (!res || res.error) { alert(res?.error || '读取文件失败'); return; }

  currentFile = { path, ext, rootIdx };
  editorDirty = false;
  document.getElementById('editorFilePath').textContent = rootIdx > 0 ? `[外部] ${path}` : path;
  document.getElementById('editorDirtyDot').classList.remove('on');
  document.getElementById('editorSaveBtn').disabled = true;
  document.getElementById('editorPlaceholder').style.display = 'none';

  const isMd = ext === '.md';
  document.getElementById('mdPreviewBtn').style.display = isMd ? '' : 'none';

  if (!monacoReady) {
    // Monaco still loading — show read-only fallback, queue for later
    _pendingFile = { path, ext, rootIdx };
    const fb = document.getElementById('editorFallback');
    fb.value = res.content;
    fb.style.display = 'flex';
    document.getElementById('monacoContainer').style.display = 'none';
    document.getElementById('mdPreviewPane').classList.remove('on');
    document.getElementById('mdPreviewBtn').textContent = '👁 预览';
    _renderTree();
    return;
  }

  // Monaco ready
  _pendingFile = null;
  document.getElementById('editorFallback').style.display = 'none';
  document.getElementById('monacoContainer').style.display = 'flex';

  const lang = EXT_LANG[ext] || 'plaintext';
  const model = monacoEditor.getModel();
  if (model) monaco.editor.setModelLanguage(model, lang);
  monacoEditor.setValue(res.content);
  // setValue fires onDidChangeModelContent; reset dirty state after
  editorDirty = false;
  document.getElementById('editorDirtyDot').classList.remove('on');
  document.getElementById('editorSaveBtn').disabled = true;

  const pane = document.getElementById('mdPreviewPane');
  if (isMd) {
    pane.classList.add('on');
    document.getElementById('mdPreviewBtn').textContent = '✏ 编辑';
  } else {
    pane.classList.remove('on');
    document.getElementById('mdPreviewBtn').textContent = '👁 预览';
  }

  _renderTree();
  _refreshMdPreview();
}

async function saveCurrentFile() {
  if (!currentFile || !monacoReady) return;
  const content = monacoEditor.getValue();
  const res = await fetch('/api/fs/write', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: currentFile.path, content, root: currentFile.rootIdx || 0 }),
  }).then(r => r.json()).catch(() => null);

  if (!res || res.error) { alert(res?.error || '保存失败'); return; }
  editorDirty = false;
  document.getElementById('editorDirtyDot').classList.remove('on');
  document.getElementById('editorSaveBtn').disabled = true;
}

// ─── Markdown preview ────────────────────────────────────
function toggleMdPreview() {
  const pane = document.getElementById('mdPreviewPane');
  const btn  = document.getElementById('mdPreviewBtn');
  if (pane.classList.contains('on')) {
    pane.classList.remove('on');
    btn.textContent = '👁 预览';
  } else {
    pane.classList.add('on');
    btn.textContent = '✏ 编辑';
    _refreshMdPreview();
  }
}

function _refreshMdPreview() {
  const pane = document.getElementById('mdPreviewPane');
  if (!pane.classList.contains('on') || !monacoEditor) return;
  const content = monacoEditor.getValue();
  if (typeof marked !== 'undefined') {
    pane.innerHTML = marked.parse(content);
  } else {
    pane.innerHTML = `<pre style="white-space:pre-wrap;font-size:12px">${esc(content)}</pre>`;
  }
}
